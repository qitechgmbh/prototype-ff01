type: zip

items:
  - type: folder
    name: orders
    items:
      - type: list
        of:
          type: folder
          name: "\\d+"
          items:
            $ref: entry

  - type: folder
    name: days
    items:
      - type: list
        of:
          type: folder
          name: "\\d{8}"
          items:
            $ref: entry

templates:
  entry:
    weights:
      type: csv
      columns:
        datetime: datetime
        w0: float
        w1: float
        wt: float

    plates:
      type: csv
      columns:
        datetime: datetime
        peak: float
        drop: float
        exit: float
        in_bounds: bool

    state:
      type: csv
      columns:
        datetime: datetime
        order_id: integer
        state_id: integer

    bounds:
      type: csv
      columns:
        datetime: datetime
        min: float
        max: float
        desired: float